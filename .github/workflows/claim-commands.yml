name: claim-bot commands

# Reusable workflow: handle `claim` / `disclaim` / `propose PR #N` / `withdraw PR #N`
# comments. Adopters call this from a thin caller triggered by `issue_comment`.
on:
  workflow_call:
    inputs:
      project-title:
        required: true
        type: string
      status-field:
        required: false
        type: string
        default: Status
      status-unclaimed:
        required: false
        type: string
        default: Unclaimed
      status-claimed:
        required: false
        type: string
        default: Claimed
      status-in-progress:
        required: false
        type: string
        default: In Progress
      terminal-statuses:
        required: false
        type: string
        default: In Review,Completed
      expiry-field:
        required: false
        type: string
        default: Claim Expires
      default-ttl:
        required: false
        type: string
        default: 30d
      max-ttl:
        required: false
        type: string
        default: 90d
      app-id:
        description: GitHub App ID. If set, a short-lived installation token is minted and used.
        required: false
        type: string
        default: ''
    secrets:
      app-private-key:
        description: GitHub App private key (PEM). Required when app-id is set.
        required: false
      project-token:
        description: A PAT to use instead of a GitHub App.
        required: false

jobs:
  command:
    # Only react to created comments; ignore the bot's own and other events.
    if: github.event_name == 'issue_comment' && github.event.action == 'created'
    runs-on: ubuntu-latest
    # Serialize per issue so two near-simultaneous comments don't race.
    concurrency:
      group: claim-bot-issue-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions: {}
    steps:
      # Mint a GitHub App installation token (org-scoped, for org Projects v2) when app-id is set.
      - id: app-token
        if: inputs.app-id != ''
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ inputs.app-id }}
          private-key: ${{ secrets.app-private-key }}
          owner: ${{ github.repository_owner }}
      # Pinned to the major tag; this reusable workflow and the action are released together.
      - uses: leanprover-community/claim-bot@v1
        with:
          mode: command
          project-token: ${{ steps.app-token.outputs.token || secrets.project-token }}
          project-title: ${{ inputs.project-title }}
          status-field: ${{ inputs.status-field }}
          status-unclaimed: ${{ inputs.status-unclaimed }}
          status-claimed: ${{ inputs.status-claimed }}
          status-in-progress: ${{ inputs.status-in-progress }}
          terminal-statuses: ${{ inputs.terminal-statuses }}
          expiry-field: ${{ inputs.expiry-field }}
          default-ttl: ${{ inputs.default-ttl }}
          max-ttl: ${{ inputs.max-ttl }}
