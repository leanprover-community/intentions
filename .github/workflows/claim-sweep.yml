name: claim-bot sweep

# Reusable workflow: expire stale claims. Adopters call this from a thin caller
# triggered by `schedule` (and usually `workflow_dispatch`).
on:
  workflow_call:
    inputs:
      project-title:
        required: true
        type: string
      status-field:
        required: false
        type: string
        default: Status
      status-unclaimed:
        required: false
        type: string
        default: Unclaimed
      status-claimed:
        required: false
        type: string
        default: Claimed
      status-in-progress:
        required: false
        type: string
        default: In Progress
      expiry-field:
        required: false
        type: string
        default: Claim Expires
      default-ttl:
        required: false
        type: string
        default: 30d
      expire-in-progress:
        required: false
        type: boolean
        default: false
      backfill-legacy:
        required: false
        type: string
        default: grace
      app-id:
        description: GitHub App ID. If set, a short-lived installation token is minted and used.
        required: false
        type: string
        default: ''
    secrets:
      app-private-key:
        description: GitHub App private key (PEM). Required when app-id is set.
        required: false
      project-token:
        description: A PAT to use instead of a GitHub App.
        required: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    # One sweep at a time across the whole project.
    concurrency:
      group: claim-bot-sweep
      cancel-in-progress: false
    permissions: {}
    steps:
      - id: app-token
        if: inputs.app-id != ''
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ inputs.app-id }}
          private-key: ${{ secrets.app-private-key }}
          owner: ${{ github.repository_owner }}
      # Pinned to the major tag; this reusable workflow and the action are released together.
      - uses: leanprover-community/claim-bot@v1
        with:
          mode: sweep
          project-token: ${{ steps.app-token.outputs.token || secrets.project-token }}
          project-title: ${{ inputs.project-title }}
          status-field: ${{ inputs.status-field }}
          status-unclaimed: ${{ inputs.status-unclaimed }}
          status-claimed: ${{ inputs.status-claimed }}
          status-in-progress: ${{ inputs.status-in-progress }}
          expiry-field: ${{ inputs.expiry-field }}
          default-ttl: ${{ inputs.default-ttl }}
          expire-in-progress: ${{ inputs.expire-in-progress }}
          backfill-legacy: ${{ inputs.backfill-legacy }}
