name: 'Intentions'
description: 'Coordinate who works on what: claim/disclaim tasks via issue comments, with configurable claim expiry (TTL).'
author: 'leanprover-community'

inputs:
  mode:
    description: 'What to run: "command" (handle an issue_comment), "lifecycle" (react to issue/PR events), or "sweep" (expire stale claims).'
    required: true
  project-token:
    description: 'GitHub App installation token (preferred for orgs) or fine-grained PAT that can write the Projects v2 board. The default GITHUB_TOKEN cannot write org-level Projects v2. Used for Issue/PR writes too unless repo-token is set.'
    required: true
  repo-token:
    description: 'Token for Issue/PR REST writes and repo-level GraphQL reads (assign, comment, link PRs). The reusable workflow passes the job GITHUB_TOKEN here so the project-token only needs Projects access. Falls back to project-token when empty.'
    required: false
    default: ''
  project-title:
    description: 'Title of the GitHub Projects v2 board to drive.'
    required: true
  status-field:
    description: 'Name of the single-select board field tracking task state.'
    required: false
    default: 'Status'
  status-unclaimed:
    description: 'Name of the "unclaimed" option of the status field.'
    required: false
    default: 'Unclaimed'
  status-claimed:
    description: 'Name of the "claimed" option of the status field.'
    required: false
    default: 'Claimed'
  status-in-progress:
    description: 'Name of the "in progress" option of the status field (a draft PR is open).'
    required: false
    default: 'In Progress'
  status-in-review:
    description: 'Name of the "in review" option (lifecycle moves a task here when a ready PR is open). Skipped if the board has no such option.'
    required: false
    default: 'In Review'
  status-completed:
    description: 'Name of the "completed" option (lifecycle moves a task here when its PR merges or the issue closes). Skipped if the board has no such option.'
    required: false
    default: 'Completed'
  auto-add:
    description: 'In lifecycle mode, add newly opened issues to the board as Unclaimed.'
    required: false
    default: 'true'
  auto-add-labels:
    description: 'Comma-separated label allowlist for auto-add. Empty adds every opened issue; otherwise only issues carrying one of these labels are added (e.g. "intention").'
    required: false
    default: ''
  claim-on-open:
    description: 'In lifecycle mode, auto-claim a newly opened (auto-added) issue for its author, so registering needs only the issue form and no separate `claim` comment.'
    required: false
    default: 'false'
  claim-expiry-field:
    description: 'Issue-form field label to read the auto-claim expiry from (e.g. "Credible expiry date"). Empty, missing, or unparseable falls back to default-ttl. Only used when claim-on-open is true.'
    required: false
    default: ''
  terminal-statuses:
    description: 'Comma-separated status names the bot recognizes but does not manage (claims here are refused cleanly).'
    required: false
    default: 'In Review,Completed'
  expiry-field:
    description: 'Name of the board Text field that stores each claim''s expiry as an ISO 8601 UTC datetime (the machine source of truth).'
    required: false
    default: 'Claim Expires'
  note-field:
    description: 'Name of the board Text field that holds each claim''s freeform note (scraped from the lines following a `claim` comment). Optional: if the board has no such field, notes are silently ignored.'
    required: false
    default: 'Claim Note'
  default-ttl:
    description: 'TTL applied to a bare `claim`. Accepts a duration (e.g. 1h, 7d, 3 weeks, 30d). Set to "none" or "off" to disable expiry entirely for this project.'
    required: false
    default: '30d'
  max-ttl:
    description: 'Maximum TTL a claimant may request; longer requests are rejected with a helpful message.'
    required: false
    default: '90d'
  expire-in-progress:
    description: 'Whether the sweep also expires items in the "in progress" status (an open PR was proposed).'
    required: false
    default: 'false'
  backfill-legacy:
    description: 'How the sweep treats Claimed items with an empty expiry (legacy claims): "grace" (set now+default-ttl, skip one round), "ignore" (never touch), or "expire".'
    required: false
    default: 'grace'

runs:
  using: 'node20'
  main: 'dist/index.js'
