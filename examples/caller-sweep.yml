# Copy to `.github/workflows/claim-sweep.yml` in your project.
# Periodically expires stale claims. Omit entirely if you set default-ttl: none.
name: Claim bot sweep

on:
  schedule:
    # Every 6 hours. Use a tighter cadence (e.g. "*/15 * * * *") if you rely on
    # short, sub-day TTLs — GitHub cron is loose, so release lags the schedule.
    - cron: "17 */6 * * *"
  workflow_dispatch: {}

jobs:
  sweep:
    uses: leanprover-community/claim-bot/.github/workflows/claim-sweep.yml@v1
    with:
      project-title: "My Project"
      default-ttl: "30d"
      expire-in-progress: false
      backfill-legacy: "grace"
      app-id: ${{ vars.CLAIM_BOT_APP_ID }}
    secrets:
      app-private-key: ${{ secrets.CLAIM_BOT_APP_PRIVATE_KEY }}
      # Or, instead of a GitHub App, use a PAT:
      # project-token: ${{ secrets.CLAIM_BOT_TOKEN }}
